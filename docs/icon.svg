<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#0a2a5e"/>
    </linearGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="diskSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect x="32" y="32" width="960" height="960" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Database stack -->
  <g filter="url(#shadow)" transform="translate(0,-40)">
    <!-- Bottom disk -->
    <path d="M 240 720
             C 240 770, 392 800, 512 800
             C 632 800, 784 770, 784 720
             L 784 640
             C 784 690, 632 720, 512 720
             C 392 720, 240 690, 240 640 Z"
          fill="url(#diskSide)"/>
    <ellipse cx="512" cy="640" rx="272" ry="56" fill="url(#disk)"/>

    <!-- Middle disk -->
    <path d="M 240 580
             C 240 630, 392 660, 512 660
             C 632 660, 784 630, 784 580
             L 784 500
             C 784 550, 632 580, 512 580
             C 392 580, 240 550, 240 500 Z"
          fill="url(#diskSide)" opacity="0.95"/>
    <ellipse cx="512" cy="500" rx="272" ry="56" fill="url(#disk)"/>

    <!-- Top disk -->
    <path d="M 240 440
             C 240 490, 392 520, 512 520
             C 632 520, 784 490, 784 440
             L 784 360
             C 784 410, 632 440, 512 440
             C 392 440, 240 410, 240 360 Z"
          fill="url(#diskSide)"/>
    <ellipse cx="512" cy="360" rx="272" ry="56" fill="url(#disk)"/>
    <ellipse cx="512" cy="360" rx="272" ry="56" fill="none" stroke="#bae6fd" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- MDB wordmark -->
  <g font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
     font-weight="800"
     fill="#ffffff"
     text-anchor="middle">
    <text x="512" y="930" font-size="170" letter-spacing="8">MDB</text>
  </g>
</svg>
