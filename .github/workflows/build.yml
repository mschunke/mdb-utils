name: Build installers

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  # Run JavaScript actions on Node.js 24 (Node 20 is deprecated).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: mac
            build_cmd: npm run dist:mac
          - os: windows-latest
            artifact: win
            build_cmd: npm run dist:win
          - os: ubuntu-latest
            artifact: linux
            build_cmd: npm run dist:linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: ${{ matrix.build_cmd }}
        env:
          # Skip code signing on PR builds — CI does not have certificates.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdb-utils-${{ matrix.artifact }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: ignore
          retention-days: 14
