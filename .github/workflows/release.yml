name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Run JavaScript actions on Node.js 24 (Node 20 is deprecated).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_cmd: npm run dist:mac
          - os: windows-latest
            build_cmd: npm run dist:win
          - os: ubuntu-latest
            build_cmd: npm run dist:linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: ${{ matrix.build_cmd }} -- --publish never
        env:
          # macOS code signing + notarization. Conditionally set so the
          # Windows runner doesn't try to use the macOS cert to sign .exe files.
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
          # Skip Windows code signing (no cert configured yet).
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'Windows' && 'false' || '' }}

      - name: Strip auto-updater metadata (blockmaps + latest*.yml)
        shell: bash
        run: |
          # The app does not bundle electron-updater, so these files are unused.
          find release -maxdepth 1 -type f \( -name '*.blockmap' -o -name 'latest*.yml' -o -name 'builder-*.yml' \) -delete -print

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
